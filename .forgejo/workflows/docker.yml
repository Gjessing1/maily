# Forgejo Actions equivalent of .github/workflows/docker.yml.
# Builds the backend image and pushes it to Forgejo's built-in container
# registry at git.gjessing.io. The deployment host then `docker compose pull`s
# git.gjessing.io/gjessing1/maily-backend and restarts.
#
# Notes specific to this runner (host-Docker-socket model):
# - `runs-on: docker` -> catthehacker/ubuntu:act-latest, which has the docker CLI.
# - docker build/push run against the HOST daemon, which can only reach the
#   registry by its public name, so we use git.gjessing.io (HTTPS via Caddy),
#   not the internal forgejo:3000.
# - secrets.GITHUB_TOKEN is injected automatically by Forgejo; it can push
#   packages for this repo's owner, so no credentials are stored anywhere.
name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: git.gjessing.io/gjessing1/maily-backend

jobs:
  # Single job: the quality gate (format, lint, types, tests) now lives INSIDE the
  # image build (backend/Dockerfile), so there is no separate `verify` job and the
  # dependency tree — including the slow better-sqlite3 native compile — is installed
  # exactly once instead of twice (once here, once in the Dockerfile) per push.
  #
  # Caching is handled by the host BuildKit daemon: the `npm ci` layer is reused
  # whenever package-lock.json is unchanged, and the npm download cache mount in the
  # Dockerfile survives even a lockfile change. The old actions/cache node_modules
  # restore (which was unreliable on this instance) is gone.
  build-and-push:
    runs-on: docker
    permissions:
      contents: read
      packages: write # not sufficient alone on this instance; push uses REGISTRY_TOKEN (see login step)
    env:
      DOCKER_BUILDKIT: '1' # required for the Dockerfile's RUN --mount=type=cache npm cache
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Forgejo registry
        # The automatic GITHUB_TOKEN only gets package *read* on this instance, so
        # blob uploads 401 even with `packages: write`. Use a PAT (write:package)
        # stored as the REGISTRY_TOKEN repo secret instead.
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.gjessing.io -u gjessing1 --password-stdin

      - name: Build and push
        # --progress=plain so the verbose npm + better-sqlite3 compile output is
        # readable in the run log (the default TTY UI collapses it). The build itself
        # runs the quality gate; a failure here means nothing is pushed.
        run: |
          SHA_TAG="${GITHUB_SHA::7}"
          docker build --progress=plain -f backend/Dockerfile -t "$IMAGE:latest" -t "$IMAGE:$SHA_TAG" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"

  # Redeploy on the host after a successful main build. Runs against the host
  # daemon via the mounted Docker socket; the deploy project (compose file +
  # .env) is bind-mounted into the job by the runner. Pulls git.gjessing.io/...
  # :latest — the image this workflow just pushed.
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: docker
    env:
      DEPLOY_DIR: /home/gjessing/docker/maily
    steps:
      - name: Registry auth
        run: |
          mkdir -p ~/.docker
          auth=$(printf 'gjessing1:%s' "${{ secrets.REGISTRY_TOKEN }}" | base64 -w0)
          printf '{"auths":{"git.gjessing.io":{"auth":"%s"}}}' "$auth" > ~/.docker/config.json
      - name: Pull and restart
        run: |
          cd "$DEPLOY_DIR"
          docker compose pull
          docker compose up -d --remove-orphans
