# Forgejo Actions equivalent of .github/workflows/docker.yml.
# Builds the backend image and pushes it to Forgejo's built-in container
# registry at git.gjessing.io. The deployment host then `docker compose pull`s
# git.gjessing.io/gjessing1/maily-backend and restarts.
#
# Notes specific to this runner (host-Docker-socket model):
# - `runs-on: docker` -> catthehacker/ubuntu:act-latest, which has the docker CLI.
# - docker build/push run against the HOST daemon, which can only reach the
#   registry by its public name, so we use git.gjessing.io (HTTPS via Caddy),
#   not the internal forgejo:3000.
# - secrets.GITHUB_TOKEN is injected automatically by Forgejo; it can push
#   packages for this repo's owner, so no credentials are stored anywhere.
name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: git.gjessing.io/gjessing1/maily-backend

jobs:
  # Quality gate: formatting, lint, types and unit tests must pass before we build/push.
  verify:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # No `cache: npm` here: the self-hosted runner bind-mounts a persistent
          # npm *download* cache at /npm-cache (npm_config_cache, see
          # runner-config.yml in /home/gjessing/docker/forgejo). That eliminates
          # re-downloads, but `npm ci` still re-extracts every package AND rebuilds
          # the better-sqlite3 native addon each run — the real cost on this N150.

      # Cache the installed node_modules themselves (all workspaces), keyed on the
      # lockfile + Node major. On a hit we skip `npm ci` entirely, so no extraction
      # and no native rebuild — the dominant cost on this low-power host.
      - name: Cache node_modules
        id: nmcache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            shared/node_modules
            backend/node_modules
            frontend/node_modules
          key: nodemods-n24-${{ hashFiles('package-lock.json') }}

      # --no-audit/--no-fund drop a network round-trip (the audit step was even
      # erroring on this box). --prefer-offline leans on the download cache.
      - if: steps.nmcache.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --prefer-offline

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build-and-push:
    needs: verify
    runs-on: docker
    permissions:
      contents: read
      packages: write # not sufficient alone on this instance; push uses REGISTRY_TOKEN (see login step)
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Forgejo registry
        # The automatic GITHUB_TOKEN only gets package *read* on this instance, so
        # blob uploads 401 even with `packages: write`. Use a PAT (write:package)
        # stored as the REGISTRY_TOKEN repo secret instead.
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.gjessing.io -u gjessing1 --password-stdin

      - name: Build and push
        run: |
          SHA_TAG="${GITHUB_SHA::7}"
          docker build -f backend/Dockerfile -t "$IMAGE:latest" -t "$IMAGE:$SHA_TAG" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"
