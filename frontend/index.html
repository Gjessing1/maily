<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0b0b0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!--
      `apple-mobile-web-app-capable` is deprecated in Chromium (which logs a
      console warning) in favour of the standard `mobile-web-app-capable` above,
      but iOS Safari still needs it to launch the installed PWA in standalone
      (full-screen) mode. Both are kept deliberately; the Chromium warning is benign.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="maily" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Favicon: prefer the crisp SVG where supported; PNG PWA icons are the
         fallback and double as the browser-tab favicon (no separate .ico needed). -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <title>maily</title>
    <script>
      // Set the theme before first paint so light-mode users don't flash dark.
      // Mirrors src/state/theme.ts; React keeps it in sync after mount.
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem('maily.prefs') || '{}');
          var t = p.theme || 'system';
          if (t === 'system')
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          /* default (dark) styling applies */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
