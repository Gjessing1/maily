# Build the backend image and push it to GitHub Container Registry (GHCR).
# Runs on every push to main; the deployment host then `docker compose pull`s
# ghcr.io/gjessing1/maily-backend and restarts (see /home/gjessing/docker/maily).
name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/gjessing1/maily-backend

jobs:
  # Single job: the quality gate (format, lint, types, tests) now runs INSIDE the image
  # build (backend/Dockerfile), so deps are installed once instead of twice (no separate
  # `verify` job + `npm ci`). A gate failure fails the build, so nothing is pushed.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
